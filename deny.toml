# cargo-deny supply-chain gate (architecture.md §9.5): RUSTSEC advisories,
# a license allowlist, banned/duplicate crates, and a source allowlist.

[advisories]
# Fail on RUSTSEC vulnerabilities and yanked crates. Unmaintained advisories are
# scoped to direct workspace deps — a transitive build-time crate going
# unmaintained (e.g. paste, bincode) is noise, not an actionable supply-chain
# risk for this tree.
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
# Allow only the licenses in the RustCrypto + clap + gtk4 + uniffi dependency
# set; anything else fails the build for explicit review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9
# The workspace's own crates are publish = false; they carry no license field and
# are not a supply-chain concern.
private = { ignore = true }

[bans]
# Duplicate versions are a warning (the gtk/getrandom trees pull a few); real
# wildcard version requirements are forbidden, but intra-workspace path deps
# (which have no version req) are not wildcards.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Only crates.io; no git or unknown registries may enter the build.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
